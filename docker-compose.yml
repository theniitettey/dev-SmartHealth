# ── Docker Compose ────────────────────────────────────────────
# Smart Health Sync — Multi-service Docker setup
# Authors: Enock Queenson Eduafo & Christabel Araba Edumadze | University of Ghana 2026

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: smarthealth-backend
    env_file:
      - path: .env
        required: false        # app has built-in fallbacks; .env is optional
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - SECRET_KEY=${SECRET_KEY:-smarthealthsync-docker-secret}
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set (e.g. postgresql://user:pass@host:5432/db)}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./main.py:/app/main.py
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
