# ── Render.com Deployment Configuration ─────────────────────
# Smart Health Sync v2.0
# Author: Enock Queenson Eduafo | University of Ghana 2026

services:
  - type: web
    name: smart-health-sync
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /api/health
